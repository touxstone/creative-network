services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://creative:creative@postgres:5432/creative_network?schema=public
      DATABASE_URL_UNPOOLED: postgresql://creative:creative@postgres:5432/creative_network?schema=public
      AUTH_SECRET: replace-with-a-32-character-secret
      NEXTAUTH_SECRET: replace-with-a-32-character-secret
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: creative
      POSTGRES_PASSWORD: creative
      POSTGRES_DB: creative_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creative -d creative_network"]
      interval: 5s
      timeout: 5s
      retries: 10

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run db:studio -- --hostname 0.0.0.0
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: postgresql://creative:creative@postgres:5432/creative_network?schema=public
      DATABASE_URL_UNPOOLED: postgresql://creative:creative@postgres:5432/creative_network?schema=public
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  node_modules:
  postgres_data:
